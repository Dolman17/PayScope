[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=xml
markers =
    slow: slower-running tests
    integration: integration-style tests
    xfail_architecture: intentional future-state tests for planned architecture