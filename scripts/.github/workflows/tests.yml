name: PayScope Tests

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - "*"

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///test_ci.sqlite
      SECRET_KEY: github-actions-test-secret
      INITIAL_ADMIN_USERNAME: bootstrap_admin
      INITIAL_ADMIN_PASSWORD: bootstrap_password
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install app dependencies
        run: |
          pip install -r requirements.txt

      - name: Install test dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest -ra