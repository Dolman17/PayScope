{% extends "base.html" %}

{% block title %}Login | Pay Rate Map{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded shadow">
    <h1 class="text-2xl font-semibold text-center text-[#0160B1] mb-6">Login to Pay Rate Map</h1>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-medium mb-2" for="username">Username</label>
            <input type="text" name="username" required
                   class="w-full border border-gray-300 px-3 py-2 rounded focus:outline-none focus:ring focus:border-blue-300" />
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-medium mb-2" for="password">Password</label>
            <input type="password" name="password" required
                   class="w-full border border-gray-300 px-3 py-2 rounded focus:outline-none focus:ring focus:border-blue-300" />
        </div>
        <div class="mb-4">
            <label class="inline-flex items-center">
                <input type="checkbox" name="remember" class="form-checkbox">
                <span class="ml-2 text-sm text-gray-700">Remember Me</span>
            </label>
        </div>
        <button type="submit"
                class="w-full bg-[#0160B1] text-white py-2 rounded hover:bg-blue-800 transition">
            Login
        </button>
    </form>
</div>
{% endblock %}
