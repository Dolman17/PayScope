{% extends "base.html" %} 

{% block title %}Pay Rate Map: {{ sector }}{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-2 sm:px-4 py-6">

  <!-- Header + Back -->
  <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4 gap-3">
    <h1 class="text-2xl font-bold" style="color: var(--brand);">Pay Rate Map: {{ sector }}</h1>
    <a href="{{ url_for('map_sector_select') }}" class="nav-chip w-full sm:w-auto text-center">← Back to Sectors</a>
  </div>

  <!-- Filters -->
  <section class="card mb-5">
    <form method="GET" class="p-4 sm:p-5 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
      <div class="lg:col-span-2">
        <label for="job_role" class="label">Job Role</label>
        <select id="job_role" name="job_role" class="input">
          <option value="">All Job Roles</option>
          {% for role in job_roles %}
            <option value="{{ role }}" {% if filters.job_role == role %}selected{% endif %}>{{ role }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="min_pay" class="label">Min £</label>
        <input id="min_pay" type="number" step="0.01" name="min_pay" placeholder="Min £" class="input" value="{{ filters.min_pay }}">
      </div>

      <div>
        <label for="max_pay" class="label">Max £</label>
        <input id="max_pay" type="number" step="0.01" name="max_pay" placeholder="Max £" class="input" value="{{ filters.max_pay }}">
      </div>

      <div class="flex items-end">
        <button type="submit" class="btn btn-primary w-full">Filter</button>
      </div>
    </form>
  </section>

  <!-- Map + Insights side-by-side -->
  <section class="card">
    <div class="p-2 sm:p-3">
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
        <!-- Map (75% on lg+) -->
        <div class="lg:col-span-3">
          <div id="map" class="w-full rounded-lg border border-gray-200" style="height:70vh;"></div>
        </div>

        <!-- Insight Box (25% on lg+, full width on mobile) -->
        <div id="insightBox"
             class="rounded-2xl border border-slate-200 bg-white shadow-xl"
             style="height:70vh; overflow:auto;">
          <div class="flex items-center justify-between px-4 pt-3">
            <h3 class="font-semibold text-slate-800">Map Insights</h3>
            <button id="insightRefresh"
                    class="text-white text-xs font-semibold px-2 py-1 rounded-md"
                    style="background:#0160B1">Refresh</button>
          </div>
          <div id="insightBody" class="px-4 pb-4 pt-2 text-sm text-slate-700">
            <div class="py-2 text-slate-500">Calculating…</div>
          </div>
        </div>
      </div>
    </div>
  </section>

</div>
{% endblock %}

{% block scripts %}
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MarkerCluster plugin -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // ======= Config =======
      const RLW_UK = 12.00;
      const RLW_LONDON = 13.15;
      const LONDON_REGIONS = ["London", "Greater London", "City of London"];

      const ASSUME_UPLIFTS_WHEN_MISSING = false;
      const ASSUMED_WEEKEND_MULTIPLIER   = 1.25;
      const ASSUMED_BH_MULTIPLIER        = 1.50;

      // ======= Map init =======
      const map = L.map('map').setView([54.5, -3], 6);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);

      const markerClusterGroup = L.markerClusterGroup();
      const bounds = L.latLngBounds();

      // ======= Plot records =======
      {% for record in records %}
        {% if record.latitude and record.longitude %}
          (function () {
            const lat = {{ record.latitude }};
            const lon = {{ record.longitude }};
            const coords = [lat, lon];

            const logo = {{ (record.logo_url or url_for('static', filename='logos/placeholder.png')) | tojson }};
            const companyName = {{ (record.company_name or 'Unknown') | tojson }};
            const companyId = {{ (record.company_id or '') | tojson }};
            const jobRole = {{ (record.job_role or '—') | tojson }};
            const payRate = {{ (record.pay_rate if record.pay_rate is not none else 0) | tojson }};
            const postcode = {{ (record.postcode or '—') | tojson }};
            const county = {{ (record.county or '—') | tojson }};
            const month = {{ (record.imported_month or '—') | tojson }};
            const year = {{ (record.imported_year or '—') | tojson }};

            const popupHtml = `
              <div class="text-sm space-y-1 max-w-[260px]">
                <div class="flex items-center gap-2 mb-2">
                  <img src="${logo}" alt="${companyName}"
                       class="w-8 h-8 object-contain rounded border border-gray-200 bg-white"
                       onerror="this.onerror=null;this.src='{{ url_for('static', filename='logos/placeholder.png') }}';">
                  <a href="/company/${companyId}" target="_blank"
                     class="font-semibold hover:underline" style="color: var(--brand);">
                    ${companyName}
                  </a>
                </div>
                <div><strong>Job Role:</strong> ${jobRole}</div>
                <div><strong>Pay Rate:</strong> £${Number(payRate).toFixed(2)}</div>
                <div><strong>Postcode:</strong> ${postcode}</div>
                <div><strong>County:</strong> ${county}</div>
                <div><strong>Uploaded:</strong> ${month} ${year}</div>
                <div class="mt-2">
                  <a href="/company/${companyId}" target="_blank"
                     class="inline-block text-xs px-3 py-1 rounded border"
                     style="background: var(--brand); color: #fff; border-color: transparent;">
                     View Company Profile →
                  </a>
                </div>
              </div>
            `;

            const icon = L.icon({
              iconUrl: logo,
              iconSize: [40, 40],
              iconAnchor: [20, 40],
              popupAnchor: [0, -40]
            });

            // Attach structured data for Insights
            const dataProps = {
              provider_name: companyName,
              hourly_rate: Number(payRate),
              region: county,                                  // treat county as region
              service_type: {{ (sector or '') | tojson }} || jobRole,
              postcode: postcode
            };

            const marker = L.marker(coords, { icon, data: dataProps }).bindPopup(popupHtml);
            markerClusterGroup.addLayer(marker);
            bounds.extend(coords);
          })();
        {% endif %}
      {% endfor %}

      map.addLayer(markerClusterGroup);
      if (bounds.isValid()) {
        map.fitBounds(bounds, { padding: [20, 20] });
      }

      // ======= Insight logic =======
      const gbp = v => isFinite(v) ? '£' + Number(v).toFixed(2) : '—';
      const pctStr = v => isFinite(v) ? (v * 100).toFixed(1) + '%' : '—';
      const median = arr => {
        if (!arr.length) return NaN;
        const s = [...arr].sort((a,b)=>a-b);
        const m = Math.floor(s.length/2);
        return s.length % 2 ? s[m] : (s[m-1]+s[m])/2;
      };
      const mean = arr => arr.length ? (arr.reduce((a,b)=>a+b,0) / arr.length) : NaN;

      function deriveUplifts(row) {
        const base = Number(row.hourly_rate);
        if (!isFinite(base)) {
          return { weekendRate:null, weekendUplift:null, bhRate:null, bhUplift:null, usedAssumption:false };
        }
        const wRate = Number(row.weekend_rate);
        const wMult = Number(row.weekend_multiplier);
        const wPct  = Number(row.weekend_uplift_pct);

        const bhRate = Number(row.bank_holiday_rate);
        const bhMult = Number(row.bank_holiday_multiplier);
        const bhPct  = Number(row.bank_holiday_uplift_pct);

        let weekendRate = null, weekendUplift = null, bankHolidayRate = null, bankHolidayUplift = null, usedAssumption = false;

        if (isFinite(wRate)) {
          weekendRate = wRate; weekendUplift = (wRate - base) / base;
        } else if (isFinite(wMult)) {
          weekendRate = base * wMult; weekendUplift = (wMult - 1);
        } else if (isFinite(wPct)) {
          weekendUplift = wPct / 100; weekendRate = base * (1 + weekendUplift);
        } else if (ASSUME_UPLIFTS_WHEN_MISSING) {
          weekendRate = base * ASSUMED_WEEKEND_MULTIPLIER;
          weekendUplift = ASSUMED_WEEKEND_MULTIPLIER - 1;
          usedAssumption = true;
        }

        if (isFinite(bhRate)) {
          bankHolidayRate = bhRate; bankHolidayUplift = (bhRate - base) / base;
        } else if (isFinite(bhMult)) {
          bankHolidayRate = base * bhMult; bankHolidayUplift = (bhMult - 1);
        } else if (isFinite(bhPct)) {
          bankHolidayUplift = bhPct / 100; bankHolidayRate = base * (1 + bankHolidayUplift);
        } else if (ASSUME_UPLIFTS_WHEN_MISSING) {
          bankHolidayRate = base * ASSUMED_BH_MULTIPLIER;
          bankHolidayUplift = ASSUMED_BH_MULTIPLIER - 1;
          usedAssumption = true;
        }

        return { weekendRate, weekendUplift, bhRate: bankHolidayRate, bhUplift: bankHolidayUplift, usedAssumption };
      }

      function collectVisibleProviders() {
        const rows = [];
        const viewBounds = map.getBounds();

        function maybePushFromLayer(layer) {
          if (layer && typeof layer.getLatLng === 'function') {
            const ll = layer.getLatLng();
            if (ll && viewBounds.contains(ll)) {
              let props = null;
              if (layer.feature && layer.feature.properties) props = layer.feature.properties;
              else if (layer.options && layer.options.data) props = layer.options.data;
              if (props) rows.push(props);
            }
          }
        }

        map.eachLayer(l => {
          if (l && typeof l.getLayers === 'function') {
            l.getLayers().forEach(subl => {
              if (subl && typeof subl.getLayers === 'function') subl.getLayers().forEach(maybePushFromLayer);
              else maybePushFromLayer(subl);
            });
          } else {
            maybePushFromLayer(l);
          }
        });

        return rows;
      }

      function computeInsights(rows) {
        const rates = rows.map(r => Number(r.hourly_rate)).filter(isFinite);

        const total = rows.length;
        const avg = mean(rates);
        const med = median(rates);
        const min = rates.length ? Math.min(...rates) : NaN;
        const max = rates.length ? Math.max(...rates) : NaN;

        const rlwFlags = rows.map(r => {
          const base = Number(r.hourly_rate);
          if (!isFinite(base)) return null;
          const region = (r.region || '').toString();
          const threshold = LONDON_REGIONS.includes(region) ? RLW_LONDON : RLW_UK;
          return base >= threshold ? 1 : 0;
        }).filter(v => v !== null);
        const rlwPct = rlwFlags.length ? (rlwFlags.reduce((a,b)=>a+b,0) / rlwFlags.length) : NaN;

        const byRegion = {};
        const byType = {};
        rows.forEach(r => {
          if (r.region) byRegion[r.region] = (byRegion[r.region] || 0) + 1;
          if (r.service_type) byType[r.service_type] = (byType[r.service_type] || 0) + 1;
        });

        const buckets = [
          { label: '< £11',      test: v => v < 11 },
          { label: '£11–£12',    test: v => v >= 11 && v < 12 },
          { label: '£12–£13',    test: v => v >= 12 && v < 13 },
          { label: '£13–£14',    test: v => v >= 13 && v < 14 },
          { label: '≥ £14',      test: v => v >= 14 },
        ];
        const hist = buckets.map(b => ({ label: b.label, count: rates.filter(b.test).length }));

        const weekendUplifts = [], weekendRates = [];
        const bhUplifts = [], bhRates = [];
        let usedAssumptionsAny = false;

        rows.forEach(r => {
          const d = deriveUplifts(r);
          if (isFinite(d.weekendUplift)) weekendUplifts.push(d.weekendUplift);
          if (isFinite(d.weekendRate))   weekendRates.push(d.weekendRate);
          if (isFinite(d.bhUplift))      bhUplifts.push(d.bhUplift);
          if (isFinite(d.bhRate))        bhRates.push(d.bhRate);
          if (d.usedAssumption) usedAssumptionsAny = true;
        });

        return {
          total, avg, med, min, max, byRegion, byType, hist,
          rlwPct,
          weekend: {
            have: weekendUplifts.length > 0,
            avgUplift: mean(weekendUplifts),
            medUplift: median(weekendUplifts),
            typicalRate: median(weekendRates),
          },
          bankHoliday: {
            have: bhUplifts.length > 0,
            avgUplift: mean(bhUplifts),
            medUplift: median(bhUplifts),
            typicalRate: median(bhRates),
          },
          usedAssumptionsAny
        };
      }

      function renderInsightBox(stats) {
        const el = document.getElementById('insightBody');
        if (!stats || !el) return;

        if (!stats.total) {
          el.innerHTML = `
            <div class="py-2">No providers currently visible.</div>
            <div class="text-xs text-slate-500">Pan/zoom or adjust filters to see insights.</div>
          `;
          return;
        }

        const topStats = `
          <div class="grid grid-cols-2 gap-3">
            <div class="rounded-xl border border-slate-200 p-3">
              <div class="text-xs text-slate-500">Visible Providers</div>
              <div class="text-xl font-semibold">${stats.total}</div>
            </div>
            <div class="rounded-xl border border-slate-200 p-3">
              <div class="text-xs text-slate-500">Avg Hourly Rate</div>
              <div class="text-xl font-semibold">${gbp(stats.avg)}</div>
            </div>
            <div class="rounded-xl border border-slate-200 p-3">
              <div class="text-xs text-slate-500">Median</div>
              <div class="text-xl font-semibold">${gbp(stats.med)}</div>
            </div>
            <div class="rounded-xl border border-slate-200 p-3">
              <div class="text-xs text-slate-500">Range</div>
              <div class="text-xl font-semibold">${gbp(stats.min)} – ${gbp(stats.max)}</div>
            </div>
          </div>
        `;

        const rlwBlock = `
          <div class="mt-3 rounded-xl border border-slate-200 p-3">
            <div class="text-xs mb-1 font-medium text-slate-500">RLW Compliance (London-aware)</div>
            <div class="text-lg font-semibold">${pctStr(stats.rlwPct)}</div>
            <div class="text-[11px] text-slate-400 mt-1">Thresholds: UK £${RLW_UK.toFixed(2)} / London £${RLW_LONDON.toFixed(2)}</div>
          </div>
        `;

        const regions = Object.entries(stats.byRegion)
          .sort((a,b)=>b[1]-a[1]).slice(0,3)
          .map(([k,v])=>`<span class="inline-flex items-center rounded-full border border-slate-200 px-2 py-0.5 text-xs">${k}: ${v}</span>`)
          .join(' ');

        const hist = stats.hist.map(h => `
          <div class="flex items-center justify-between">
            <span>${h.label}</span>
            <span class="font-medium">${h.count}</span>
          </div>
        `).join('');

        const weekendBlock = stats.weekend.have ? `
          <div class="grid grid-cols-2 gap-3">
            <div class="rounded-xl border border-slate-200 p-3">
              <div class="text-xs text-slate-500">Weekend Uplift (avg)</div>
              <div class="text-lg font-semibold">${pctStr(stats.weekend.avgUplift)}</div>
            </div>
            <div class="rounded-xl border border-slate-200 p-3">
              <div class="text-xs text-slate-500">Typical Weekend Rate</div>
              <div class="text-lg font-semibold">${gbp(stats.weekend.typicalRate)}</div>
            </div>
          </div>
        ` : `
          <div class="rounded-xl border border-dashed border-slate-200 p-3 text-sm text-slate-500">
            Weekend uplift not in dataset${ASSUME_UPLIFTS_WHEN_MISSING ? ' (estimated via assumptions)' : ''}.
          </div>
        `;

        const bhBlock = stats.bankHoliday.have ? `
          <div class="grid grid-cols-2 gap-3">
            <div class="rounded-xl border border-slate-200 p-3">
              <div class="text-xs text-slate-500">Bank Holiday Uplift (avg)</div>
              <div class="text-lg font-semibold">${pctStr(stats.bankHoliday.avgUplift)}</div>
            </div>
            <div class="rounded-xl border border-slate-200 p-3">
              <div class="text-xs text-slate-500">Typical BH Rate</div>
              <div class="text-lg font-semibold">${gbp(stats.bankHoliday.typicalRate)}</div>
            </div>
          </div>
        ` : `
          <div class="rounded-xl border border-dashed border-slate-200 p-3 text-sm text-slate-500">
            Bank Holiday uplift not in dataset${ASSUME_UPLIFTS_WHEN_MISSING ? ' (estimated via assumptions)' : ''}.
          </div>
        `;

        document.getElementById('insightBody').innerHTML = `
          ${topStats}
          ${rlwBlock}
          <div class="mt-3">
            <div class="text-xs mb-1 font-medium text-slate-500">Top Regions</div>
            <div class="flex flex-wrap gap-1">${regions || '<span class="text-slate-400 text-xs">—</span>'}</div>
          </div>
          <div class="mt-3 rounded-xl border border-slate-200 p-3">
            <div class="text-xs mb-2 font-medium text-slate-500">Rate Distribution</div>
            <div class="space-y-1">${hist}</div>
          </div>
          <div class="mt-3 rounded-xl border border-slate-200 p-3">
            <div class="text-xs mb-2 font-medium text-slate-500">Weekend</div>
            ${weekendBlock}
          </div>
          <div class="mt-3 rounded-xl border border-slate-200 p-3">
            <div class="text-xs mb-2 font-medium text-slate-500">Bank Holiday</div>
            ${bhBlock}
          </div>
          ${stats.usedAssumptionsAny ? '<div class="mt-2 text-[11px] text-slate-400">Some values estimated using configured assumptions.</div>' : ''}
          <div class="mt-2 text-[11px] text-slate-400">Updates when you pan/zoom or apply filters.</div>
        `;
      }

      function updateInsights() {
        const rows = collectVisibleProviders();
        const stats = computeInsights(rows);
        renderInsightBox(stats);
      }

      // Hooks
      map.on('moveend', updateInsights);
      map.on('zoomend', updateInsights);
      map.on('layeradd', updateInsights);
      map.on('layerremove', updateInsights);
      window.addEventListener('filters:applied', updateInsights);
      document.getElementById('insightRefresh')?.addEventListener('click', updateInsights);

      setTimeout(updateInsights, 300);
    });
  </script>
{% endblock %}
