{% extends "base.html" %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-6">

<h1 class="text-2xl font-semibold text-slate-100 mb-4">
  Sector × Location Coverage (last 7 days)
</h1>

<div class="overflow-x-auto border border-slate-800 rounded">
<table class="min-w-full text-sm">
<thead class="bg-slate-900 text-slate-300">
<tr>
  <th class="px-3 py-2 text-left">Sector</th>
  <th class="px-3 py-2 text-left">County</th>
  <th class="px-3 py-2 text-right">Adverts</th>
</tr>
</thead>
<tbody class="divide-y divide-slate-800">
{% for r in rows %}
<tr class="{% if r.adverts < 10 %}bg-amber-950/40{% endif %}">
  <td class="px-3 py-2">{{ r.sector or "Unknown" }}</td>
  <td class="px-3 py-2">{{ r.county or "Unknown" }}</td>
  <td class="px-3 py-2 text-right font-semibold">
    {{ r.adverts }}
  </td>
</tr>
{% endfor %}
</tbody>
</table>
</div>

</div>
{% endblock %}
