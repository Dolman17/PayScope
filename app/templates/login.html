{% extends "base.html" %}

{% block title %}Login | PayScope{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">

  <div class="card p-6 sm:p-8 mt-6">
    <h1 class="text-2xl font-bold text-center mb-6" style="color: var(--brand);">
      Login to Pay Rate Map
    </h1>

    <form method="POST"
          action="{{ url_for('auth.login') }}"
          class="space-y-5"
          autocomplete="on">

      {{ csrf_token() }}

      <!-- Username -->
      <div>
        <label for="username" class="label">Username</label>
        <input id="username"
               type="text"
               name="username"
               required
               class="input"
               autocomplete="username">
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="label">Password</label>
        <input id="password"
               type="password"
               name="password"
               required
               class="input"
               autocomplete="current-password">
      </div>

      <!-- Remember Me -->
      <div class="flex items-center">
        <input type="checkbox"
               id="remember"
               name="remember"
               class="h-4 w-4 text-[var(--brand)] border-gray-300 rounded focus:ring-[var(--brand)]">
        <label for="remember" class="ml-2 text-sm text-gray-700">Remember Me</label>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary w-full">
        Login
      </button>
    </form>
  </div>

</div>
{% endblock %}
